<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catch Me</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene" id="scene">
    <div class="timer" id="timer">00.00</div>

    <div class="button-layer">
      <button id="escapeButton" type="button" aria-label="Impossible button">Try me</button>
    </div>
  </main>

  <section class="start-screen" id="startScreen">
    <div class="start-wrap">
      <h1 class="start-title">Catch The Button</h1>
      <div class="start-menu">
        <section class="menu-card start-card">
          <h2 class="menu-card-title"></h2>
          <button class="start-button" id="startGameButton" type="button">Start Game</button>
        </section>

        <section class="menu-card">
          <h2 class="menu-card-title">Game Color Toggle</h2>
          <div class="toggle-row">
            <span class="toggle-label" id="themeLabel">Dark Mode</span>
            <button class="toggle" id="themeToggle" type="button" role="switch" aria-checked="false" aria-label="Toggle light mode"></button>
          </div>
          <div class="toggle-caption">Switch between light and dark mode before the chase starts.</div>
        </section>

        <section class="menu-card">
          <h2 class="menu-card-title">Difficulty Settings</h2>
          <div class="difficulty-grid" id="difficultyGrid">
            <button class="difficulty-option active" type="button" data-difficulty="noob">Noob</button>
            <button class="difficulty-option" type="button" data-difficulty="amateur">Amateur</button>
            <button class="difficulty-option" type="button" data-difficulty="pro">Pro</button>
            <button class="difficulty-option" type="button" data-difficulty="god">God</button>
          </div>
        </section>
      </div>
    </div>
  </section>

  <section class="taunt-screen" id="tauntScreen" aria-live="polite">
    <div class="taunt-wrap">
      <div class="taunt-time-label">Time taken to Click :</div>
      <div class="taunt-time-value" id="tauntTimeValue">00.00</div>
      <div class="taunt-mode" id="tauntMode">Mode: Noob</div>
      <div class="taunt-text" id="tauntText">You a NERD</div>
      <div class="taunt-actions">
        <button class="start-button taunt-action-button" id="restartButton" type="button">Restart</button>
        <button class="start-button taunt-action-button" id="homeButton" type="button">Home Screen</button>
      </div>
      <div class="taunt-subtext" id="tauntSubtext"></div>
      <div class="taunt-sign" id="tauntSign"></div>
      <div class="taunt-light" id="tauntLight"></div>
    </div>
  </section>

  <script src="script.js" defer></script>
</body>
</html>
